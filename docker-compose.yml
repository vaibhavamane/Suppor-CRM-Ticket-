version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticket_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tickets_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ticket_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tickets_db
      - PROJECT_NAME=Datastraw Support CRM
      - BLOOM_CAPACITY=10000
      - BLOOM_ERROR_RATE=0.001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
